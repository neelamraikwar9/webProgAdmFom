<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departmental Store Items</title>
    <style>
        table {
            background-color: lightblue;
            border-collapse: collapse;
            width: 80%;
            margin: auto;
        }

        th {
            font-size: 14pt;
            font-weight: bold;
            background-color: #87CEEB;
            /* diff shade for heading*/
            ;
            padding: 8px;
        }

        td {
            font-size: 12pt;
            font-family: "Times New Roman", Times, serif;
            padding: 8px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: lightyellow;
        }

        tr:nth-child(odd) {
            background-color: lightgreen;
        }

        h2 {
            text-align: center;
            color: darkblue;
        }
    </style>
</head>

<body>
    <div>
        <h2>Departmental Store Items</h2>
        <table border="1">
            <tr>
                <th>Item Code</th>
                <th>Item Name</th>
                <th>Unit Price</th>
                <th>Date of Expiry</th>
            </tr>
            <tr>
                <td>101</td>
                <td>Shampoo</td>
                <td>₹150</td>
                <td>12-2025</td>
            </tr>

            <tr>
                <td>102</td>
                <td>Soap</td>
                <td>₹40</td>
                <td>05-2026</td>
            </tr>

            <tr>
                <td>103</td>
                <td>Toothpaste</td>
                <td>₹90</td>
                <td>09-2026</td>
            </tr>

            <tr>
                <td>104</td>
                <td>Brush</td>
                <td>₹20</td>
                <td>09-2027</td>
            </tr>

        </table>
    </div>

</body>

</html>
