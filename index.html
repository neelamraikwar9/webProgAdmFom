<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Admission Form</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="validation.js"></script>
</head>
<body>
    <form id="admissionForm" onsubmit= "return validateForm()">
   <h2>Online Admission Form</h2>
   <br>
    <label for="name">Name of the candidate:</label>
    <input type="text" id="name" name="name"/>
    <br/>
    <br />

    <label for="motherName">Mother's Name:</label>
    <input type="text" id="motherName" name="motherName" />
    <br/>
    <br />

    <label for="subject">Subject:</label>
    <select id="subject" name="subject">
        <option vlaue="">Select Subject</option>
        <option value="CS-01">CS-01</option>
        <option value="CS-02">CS-02</option>
        <option value="CS-03">CS-03</option>
        <option value="CS-04">CS-04</option>
    </select>
    <br/>
    <br />

    <label for="fee">Fee of the Subject:</label>
    <input type="number" id="fee" name="fee"/>
    <br/>
    <br />

    <label>Have you registered for a subject earlier?</label>
    <br />
    <input type="radio" name="registered" value="Yes"/>Yes
    <br/>
    <input type="radio" name="registered" value="No" />No
    <br/>
    <br />

    <label for="background">Your Educational Background: </label>
    <br/>
    <textarea name="background" id="background" rows="4" cols="30"></textarea> 
    <br />
    <br />

    <button type="submit">Submit</button>
   </form>

   <script src="validation.js"></script>
    
</body>
</html>
